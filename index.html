<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API 连通性测试</title>
<style>
body{font-family:'Courier New',monospace;background:#0c0c0c;color:#ccc;padding:20px;font-size:14px;max-width:600px;margin:0 auto;}
h2{color:#d4a853;border-bottom:1px solid #333;padding-bottom:10px;}
.test-group{background:#111;border:1px solid #222;border-radius:8px;padding:16px;margin:16px 0;}
.test-group h3{color:#aaa;font-size:12px;margin-bottom:12px;}
label{display:block;font-size:12px;color:#888;margin-bottom:4px;margin-top:10px;}
input{width:100%;padding:8px 10px;background:#1a1a1a;border:1px solid #333;border-radius:4px;color:#fff;font-family:monospace;font-size:12px;outline:none;box-sizing:border-box;}
input:focus{border-color:#d4a853;}
button{margin-top:12px;padding:10px 20px;background:#d4a853;color:#000;border:none;border-radius:6px;font-family:monospace;font-size:13px;font-weight:bold;cursor:pointer;width:100%;}
button:hover{background:#f0d080;}
button:disabled{opacity:0.4;cursor:wait;}
#log{margin-top:16px;background:#0a0a0a;border:1px solid #222;border-radius:8px;padding:16px;min-height:100px;white-space:pre-wrap;line-height:1.8;font-size:12px;}
.ok{color:#4ade80;} .err{color:#f87171;} .info{color:#fbbf24;} .dim{color:#555;}
hr{border:none;border-top:1px solid #222;margin:16px 0;}
</style>
</head>
<body>
<h2>🔍 API 连通性测试</h2>

<div class="test-group">
  <h3>API 1 — 智谱 (国内直连)</h3>
  <label>API 地址</label>
  <input type="text" id="u1" value="https://open.bigmodel.cn/api/paas/v4/chat/completions">
  <label>API Key</label>
  <input type="password" id="k1" value="a840721ba01a4f389f54d36a71177f3c.HJMM5C4iFFQCAuWt">
  <label>模型</label>
  <input type="text" id="m1" value="glm-4-flash">
  <button onclick="runTest(1)" id="btn1">测试智谱 API</button>
</div>

<div class="test-group">
  <h3>API 2 — NVIDIA (需 VPN)</h3>
  <label>API 地址</label>
  <input type="text" id="u2" value="https://integrate.api.nvidia.com/v1/chat/completions">
  <label>API Key</label>
  <input type="password" id="k2" value="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">
  <label>模型</label>
  <input type="text" id="m2" value="minimaxai/minimax-m3">
  <button onclick="runTest(2)" id="btn2">测试 NVIDIA API</button>
</div>

<button onclick="runBoth()" id="btnBoth" style="background:#5bc77b;">两个都测（按顺序）</button>

<div id="log"></div>

<script>
const logEl=document.getElementById('log');
function p(text,cls=''){logEl.innerHTML+=`<span class="${cls||'dim'}">${text}</span>\n`;logEl.scrollTop=logEl.scrollHeight;}
function clear(){logEl.innerHTML='';}

async function runTest(n){
  const url=document.getElementById('u'+n).value.trim();
  const key=document.getElementById('k'+n).value.trim();
  const model=document.getElementById('m'+n).value.trim();
  const btn=document.getElementById('btn'+n);
  const name=n===1?'智谱':'NVIDIA';

  btn.disabled=true;btn.textContent='测试中...';

  p('━━━ '+name+' ━━━','info');

  // Step 1: DNS/网络
  p('① 测试网络连通性...','info');
  try{
    const t0=Date.now();
    const ctrl=new AbortController();
    const tid=setTimeout(()=>ctrl.abort(),8000);
    const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model,messages:[{role:'user',content:'hi'}],max_tokens:5,stream:false}),signal:ctrl.signal});
    clearTimeout(tid);
    const ms=Date.now()-t0;
    p('   网络可达 ✅ ('+r.status+') '+ms+'ms',r.status===200?'ok':'err');

    if(r.status===200){
      const d=await r.json();
      const reply=d.choices?.[0]?.message?.content||'';
      p('   返回: '+reply.substring(0,50),'ok');
      p('  ✅ '+name+' 完全正常！','ok');
    }else{
      const txt=await r.text();
      p('错误: '+txt.substring(0,200),'err');
      if(r.status===401)p('   → Key 无效或过期','err');
      if(r.status===429)p('   → 频率限制，稍后再试','err');
      if(r.status===404)p('   → 模型不存在或地址错误','err');
 if(r.status>=500)p('   → 服务端错误','err');
    }
  }catch(e){
    if(e.name==='AbortError'){
      p('   网络超时 ❌ (8秒无响应)','err');
      p('   → 可能需要开 VPN 或换网络','err');
    }else{
      p('   请求失败 ❌ '+e.message,'err');
    }
  }

  p('');
  btn.disabled=false;btn.textContent='测试 '+name+' API';
}

async function runBoth(){
  const btn=document.getElementById('btnBoth');
  btn.disabled=true;btn.textContent='测试中...';
  clear();
  await runTest(1);
  p('\n');
  await runTest(2);
  p('\n━━━━━━━━━━━━━━','dim');
  p('测试完毕，看上面哪个打了 ✅ 就用哪个','info');
  btn.disabled=false;btn.textContent='两个都测（按顺序）';
}
</script>
</body>
</html>
